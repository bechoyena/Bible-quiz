<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የመጽሐፍ ቅዱስ ጥያቄና መልስ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Ethiopic:wght@300;400;700&display=swap');
        
        body {
            font-family: 'Noto Serif Ethiopic', serif;
            background: linear-gradient(-45deg, #1a1c29, #232538, #131520, #2c1a30);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glowing-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37),
                        inset 0 0 20px rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .glowing-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(147, 51, 234, 0.3), rgba(236, 72, 153, 0.3), transparent 60%);
            animation: rotateGlow 6s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        .card-content {
            position: relative;
            z-index: 10;
            background: rgba(20, 22, 37, 0.85);
        }

        @keyframes rotateGlow {
            100% { transform: rotate(360deg); }
        }

        .pulse-glow {
            animation: pulseGlow 3s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.9; text-shadow: 0 0 10px rgba(168, 85, 247, 0.5); }
            50% { transform: scale(1.02); opacity: 1; text-shadow: 0 0 25px rgba(236, 72, 153, 0.8); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glowing-card max-w-2xl w-full rounded-2xl p-[2px]">
        
        <div class="card-content rounded-2xl p-8 md:p-12 text-center text-white flex flex-col items-center justify-center space-y-8">
            
            <div class="w-20 h-20 bg-gradient-to-tr from-purple-500 to-pink-500 rounded-full flex items-center justify-center shadow-lg shadow-purple-500/30 pulse-glow">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                </svg>
            </div>

            <div class="space-y-4">
                <h1 class="text-xl md:text-2xl font-bold bg-gradient-to-r from-yellow-300 via-pink-400 to-purple-400 bg-clip-text text-transparent tracking-wide leading-relaxed">
                    ለጊዜው በዚህ ምድብ የተለቀቁ ጥያቄዎች የሉም!
                </h1>
                <p class="text-gray-300 text-sm md:text-base font-light">
                    ስለቀቁ ወዲያውኑ ማሳወቂያ ይደርሶታል፤ እስከዛ ራሶን በእግዚአብሔር ቃል እየገነቡ ይጠብቁ።
                </p>
            </div>

            <div class="w-full flex items-center justify-center space-x-3 opacity-50">
                <div class="h-[1px] w-16 bg-gradient-to-r from-transparent to-purple-500"></div>
                <span class="text-purple-400 text-xs font-bold tracking-widest">✝</span>
                <div class="h-[1px] w-16 bg-gradient-to-l from-transparent to-purple-500"></div>
            </div>

            <div class="bg-white/5 border border-white/10 rounded-xl p-6 text-left relative">
                <span class="absolute -top-4 left-6 bg-gradient-to-r from-purple-600 to-pink-600 text-xs px-3 py-1 rounded-full font-bold shadow-md">
                    ቆላስይስ 3:16
                </span>
                <p class="text-gray-200 text-sm md:text-base leading-loose font-normal pt-2 text-justify">
                    "የክርስቶስ ቃል በሙላት ይኑርባችሁ፤ እርስ በርሳችሁ በጥበብ ሁሉ ተማማሩ፤ ተመካከሩ፤ በመዝሙርና በማሕሌት፣ በመንፈሳዊም ቅኔ በማመስገን በልባችሁ ለእግዚአብሔር ዘምሩ።"
                </p>
            </div>

            <p class="text-xs text-gray-500 tracking-wider">
                የመጽሐፍ ቅዱስ የጥያቄና መልስ ቦት
            </p>

        </div>
    </div>

</body>
</html>
